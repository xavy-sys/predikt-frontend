<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PREDIKT™ | Registro</title>
  <meta name="description" content="Crea tu cuenta en PREDIKT™ para jugar la quiniela." />

  <link rel="icon" href="assets/predikt-logo.png" />
  <link rel="shortcut icon" href="assets/predikt-logo.png" />
  <link rel="apple-touch-icon" href="assets/predikt-logo.png" />

  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --gold: #f6c453;
      --blue: #2d8cff;
      --danger: #ff6b6b;
      --success: #5ee6a8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(45, 140, 255, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(246, 196, 83, 0.18), transparent 32%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .auth-shell {
      width: 100%;
      max-width: 460px;
    }

    .brand {
      text-align: center;
      margin-bottom: 20px;
    }

    .brand img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.36));
    }

    .brand h1 {
      margin: 10px 0 4px;
      font-size: 2rem;
      letter-spacing: 0.08em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.35);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    .card .lead {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.45;
    }

    label {
      display: block;
      margin: 13px 0 6px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 15px;
      padding: 14px 15px;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      font-size: 1rem;
      outline: none;
    }

    input::placeholder { color: rgba(255, 255, 255, 0.48); }
    input:focus { border-color: var(--gold); }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 17px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 800;
      color: #07111f;
      background: linear-gradient(135deg, var(--gold), #ffe39a);
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .auth-message {
      display: none;
      margin: 14px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.35;
    }

    .auth-message.error {
      display: block;
      color: #fff;
      background: rgba(255, 107, 107, 0.18);
      border: 1px solid rgba(255, 107, 107, 0.42);
    }

    .auth-message.success {
      display: block;
      color: #fff;
      background: rgba(94, 230, 168, 0.15);
      border: 1px solid rgba(94, 230, 168, 0.38);
    }

    .links {
      text-align: center;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .links a {
      color: var(--gold);
      font-weight: 800;
      text-decoration: none;
    }

    .secondary-link {
      display: block;
      text-align: center;
      color: rgba(255, 255, 255, 0.68);
      text-decoration: none;
      margin-top: 18px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="brand" aria-label="PREDIKT branding">
      <img src="assets/predikt-logo.png" alt="Logo PREDIKT™" />
      <h1>PREDIKT™</h1>
      <p>Predice • Compite • Gana</p>
    </section>

    <section class="card">
      <h2>Crear mi cuenta</h2>
      <p class="lead">Regístrate para guardar tus marcadores, competir y aparecer en el ranking.</p>

      <form id="registerForm">
        <label for="fullName">Nombre</label>
        <input id="fullName" name="fullName" type="text" autocomplete="name" placeholder="Tu nombre" required />

        <label for="alias">Alias público</label>
        <input id="alias" name="alias" type="text" autocomplete="nickname" placeholder="Ej. ProfeGol" required />

        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="tu@correo.com" required />

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres" required />

        <label for="confirmPassword">Confirmar contraseña</label>
        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Repite tu contraseña" required />

        <div id="authMessage" class="auth-message"></div>

        <button id="registerButton" type="submit">Crear mi cuenta</button>
      </form>

      <div class="links">
        ¿Ya tienes cuenta? <a href="login.html">Entrar</a>
      </div>

      <a class="secondary-link" href="index.html">Volver al inicio</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.PrediktAuth) {
        window.PrediktAuth.redirectIfAuthenticated('perfil.html');
        document.getElementById('registerForm').addEventListener('submit', window.PrediktAuth.registerUser);
      }
    });
  </script>
</body>
</html>
