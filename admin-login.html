<!DOCTYPE html>
<html lang="es-MX">
<head>
<!--
Archivo: admin-login.html
Proyecto: PREDIKT™
Versión: v2.0.1 SUPABASE AUTH ENTER KEY FIX
Fecha: 2026-06-09
Elaborado por: JVSys™
Descripción:
Migración completa de PIN Beta a Supabase Auth + RPC Admin. Corrige envío con tecla Enter en correo/contraseña.
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREDIKT™ | Acceso Admin v2.0.1</title>
<link rel="icon" type="image/png" href="assets/logos/predikt-logo.png">
<style>
body{font-family:Inter,Arial,sans-serif;background:#061826;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{width:min(95%,520px);background:#0f2740;padding:24px;border-radius:24px}
input{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #345}
form{display:block} button{width:100%;padding:14px;border:0;border-radius:999px;background:#f5b942;font-weight:bold}
.msg{margin-top:12px}
</style>
</head>
<body>
<div class="card">
<h1>PREDIKT™ Admin</h1>
<p>Acceso administrativo mediante Supabase Auth.</p>

<form id="loginForm">
<input id="email" name="email" type="email" placeholder="Correo electrónico" autocomplete="email" required>
<input id="password" name="password" type="password" placeholder="Contraseña" autocomplete="current-password" required>
<button id="loginBtn" type="submit">Iniciar sesión</button>
</form>

<div id="msg" class="msg"></div>
</div>

<script src="assets/js/supabase.js"></script>
<script>
const msg=document.getElementById('msg');

function setMsg(t,c='white'){msg.textContent=t;msg.style.color=c;}

async function login(){
 try{
   setMsg('Validando...','#f5b942');

   await window.PREDIKT_SUPABASE_INIT_PROMISE;

   const client=window.prediktSupabase;

   if(!client){
      setMsg('Supabase no inicializado','red');
      return;
   }

   const email=document.getElementById('email').value.trim();
   const password=document.getElementById('password').value;

   const {error}=await client.auth.signInWithPassword({
      email,
      password
   });

   if(error){
      setMsg(error.message,'red');
      return;
   }

   const rpc=await client.rpc('predikt_current_admin_access');

   if(rpc.error || !rpc.data){
      await client.auth.signOut();
      setMsg('La cuenta no tiene permisos administrativos.','red');
      return;
   }

   setMsg('Acceso autorizado. Redirigiendo...','#48f29a');

   const next=new URLSearchParams(window.location.search).get('next');
   window.location.href=next || 'dashboard-admin.html';

 }catch(ex){
   setMsg(ex.message,'red');
 }
}

document.getElementById('loginForm').addEventListener('submit',function(event){
 event.preventDefault();
 login();
});

(async()=>{
 await window.PREDIKT_SUPABASE_INIT_PROMISE;
 if(window.prediktSupabase){
   const {data}=await window.prediktSupabase.auth.getUser();
   if(data && data.user){
      window.location.href='dashboard-admin.html';
   }
 }
})();
</script>
</body>
</html>
