  <meta name="theme-color" content="#020814" />

  <link rel="apple-touch-icon" href="./predikt-logo.png" />

  <style>
    :root {
      --bg: #020814;
      --text: #ffffff;
      --muted: rgba(255,255,255,.78);
      --cyan: #24c8ff;
      --blue: #1476ff;
      --stroke: rgba(255,255,255,.14);
      --shadow: 0 24px 70px rgba(0,0,0,.50);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      overflow-x: hidden;
    }

    .page {
      width: min(100%, 980px);
      display: grid;
      gap: 18px;
      text-align: center;
    }

    .poster-wrap {
      position: relative;
      width: min(100%, 760px);
      margin: 0 auto;
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
    }

    .poster-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at top, rgba(36,200,255,.10), transparent 42%);
    }

    .poster {
      display: block;
      width: 100%;
      height: auto;
    }

    .actions {
      display: flex;
      justify-content: center;
      padding: 4px 0 0;
    }

    .accept-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      min-height: 52px;
      padding: 14px 24px;
      border-radius: 999px;
      color: #ffffff;
      text-decoration: none;
      font-weight: 950;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 14px 34px rgba(20,118,255,.28);
      transition: transform .18s ease, filter .18s ease;
    }

    .accept-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .fallback-text {
      max-width: 680px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .fallback-text strong { color: var(--text); }

    @media (max-width: 540px) {
      body { padding: 10px; align-items: start; }
      .page { gap: 14px; }
      .poster-wrap { border-radius: 18px; }
      .accept-btn { width: min(100%, 260px); }
      .fallback-text { font-size: 13px; padding: 0 8px; }
    }
  </style>
</head>

<body>
  <main class="page" aria-label="PREDIKT temporalmente cerrado">
    <section class="poster-wrap" aria-label="PREDIKT en construcción">
      <img
        class="poster"
        src="./assets/icons/estamos%20en%20construccion%20OFF.png"
        alt="PREDIKT™ está en construcción. Pronto tendremos novedades increíbles."
      />
    </section>

    <div class="actions">
      <a class="accept-btn" href="https://jvsys.com.mx" rel="noopener">Aceptar</a>
    </div>

    <p class="fallback-text">
      <strong>PREDIKT™</strong> se encuentra temporalmente cerrado hasta nuevo aviso.
      Gracias por tu apoyo y paciencia.
    </p>
  </main>
